apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pod-health
  namespace: monitoring
  # Sobe sem label de release porque ruleSelectorNilUsesHelmValues está
  # como false no values.yaml.
spec:
  groups:
    - name: pod-health.rules
      rules:
        - alert: PodCrashLoopBackOff
          expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} em CrashLoopBackOff"
            description: "Container {{ $labels.container }} preso em CrashLoopBackOff há mais de 5min."

        # last_terminated_reason fica em 1 até o container morrer por outro
        # motivo. O AND com restart recente evita ficar alertando de um OOM
        # antigo que já se resolveu.
        - alert: PodOOMKilled
          expr: |
            (kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1)
            and on (namespace, pod, container)
            (rate(kube_pod_container_status_restarts_total[10m]) > 0)
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "OOMKill em {{ $labels.namespace }}/{{ $labels.pod }}"
            description: "Container {{ $labels.container }} morto por falta de memória. Revisar limits/requests."
